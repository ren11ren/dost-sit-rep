version: '3.8'

services:
  # ==========================================
  # PostgreSQL Database
  # ==========================================
  postgres:
    image: postgres:16-alpine
    container_name: dost-ilocos-postgres
    environment:
      POSTGRES_USER: dostuser
      POSTGRES_PASSWORD: dostpass
      POSTGRES_DB: dostdb
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U dostuser -d dostdb" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dost-net

  # ==========================================
  # Express API Backend
  # ==========================================
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    # Runs the PostgreSQL-backed Express server by default.
    # To run the simple mock in-memory server, change this command to: node simple-server.js
    command: node server.js
    ports:
      - "5010:5010" # API Server Port used by the app
      - "5005:5005" # In-memory API Server Port
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - PORT=5010
      - DB_SSL=false
      - DATABASE_URL=postgres://dostuser:dostpass@postgres:5432/dostdb
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=dostuser
      - DB_PASSWORD=dostpass
      - DB_NAME=dostdb
      - DB_CONNECT_RETRIES=20
      - DB_CONNECT_RETRY_DELAY_MS=2000
      - ALLOW_DEGRADED_DB_MODE=false
      - CORS_ALLOW_ALL=true
      - CORS_ALLOWED_ORIGINS=http://localhost:3000,http://127.0.0.1:3000,http://0.0.0.0:3000,http://host.docker.internal:3000
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - dost-net

  # ==========================================
  # React Frontend (Development server)
  # ==========================================
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    command: npm start
    ports:
      - "3000:3000" # React Dev Server Port
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - BROWSER=none # Prevent opening browser tab inside container
      - HOST=0.0.0.0
      - CORS_ALLOW_ALL=true
      - WDS_SOCKET_PORT=3000 # Hot-reloading socket port
    stdin_open: true # Keeps the react-scripts terminal active
    tty: true # Connects standard input/output channels
    depends_on:
      - backend
    networks:
      - dost-net

  # ==========================================
  # Ngrok tunnel for public preview
  # ==========================================
  ngrok:
    image: ngrok/ngrok:latest
    container_name: dost-ilocos-ngrok
    restart: unless-stopped
    environment:
      NGROK_AUTHTOKEN: "3G4fGosyJdPOeWvG38y8EOLfX1S_4REipfsR1GK2ocxNGctCk"
    command:
      - http
      - http://frontend:3000
    depends_on:
      - frontend
    networks:
      - dost-net

networks:
  dost-net:
    driver: bridge

volumes:
  postgres-data:
