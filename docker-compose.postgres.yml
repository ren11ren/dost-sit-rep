services:
  postgres:
    image: postgres:16-alpine
    container_name: dost-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: dostdb
      POSTGRES_USER: dostuser
      POSTGRES_PASSWORD: dostpass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dostuser -d dostdb"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
