version: '3.8'

services:
  # ==========================================
  # Production API Backend
  # ==========================================
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: production-backend
    ports::
      - "5002:5001" # Change the host port here
      - "5005:5005"
    environment:
      - NODE_ENV=production
      - DB_HOST=your_actual_database_host_here
      - DB_PORT=18750
      - DB_USER=avnadmin
      - DB_PASSWORD=AVNS_iAhIWlZIisjJZ9ztt9-
      - DB_NAME=defaultdb
    env_file:
      - .env
    restart: always
    networks:
      - dost-prod-net

  # ==========================================
  # Production Frontend (Nginx SPA)
  # ==========================================
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: production-frontend
    ports:
      - "80:80" # Map host port 80 to container Nginx port 80. Change to "3000:80" if port 80 is in use.
    depends_on:
      - backend
    restart: always
    networks:
      - dost-prod-net

networks:
  dost-prod-net:
    driver: bridge
