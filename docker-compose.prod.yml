version: '3.8'

services:
  # ==========================================
  # Production API Backend
  # ==========================================
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: production-backend
    ports:
      - "5002:5001" # Change the host port here
      - "5005:5005"
    environment:
      - NODE_ENV=production
      - PORT=5001
      - CORS_ALLOW_ALL=true
      - DATABASE_URL=postgres://avnadmin:AVNS_KDnWpvaIZYYBAojZYZV@pg-d9b811c-raigana362-999a.b.aivencloud.com:22998/defaultdb?sslmode=require
      - DB_HOST=pg-d9b811c-raigana362-999a.b.aivencloud.com
      - DB_PORT=22998
      - DB_USER=avnadmin
      - DB_PASSWORD=AVNS_KDnWpvaIZYYBAojZYZV
      - DB_NAME=defaultdb
      - DB_CONNECT_RETRIES=20
      - DB_CONNECT_RETRY_DELAY_MS=2000
      - ALLOW_DEGRADED_DB_MODE=false
      - CORS_ALLOW_ALL=true
      - CORS_ALLOWED_ORIGINS=http://localhost:3000,http://127.0.0.1:3000,http://0.0.0.0:3000,http://host.docker.internal:3000
    env_file:
      - .env
    restart: always
    networks:
      - dost-prod-net

  # ==========================================
  # Production Frontend (Nginx SPA)
  # ==========================================
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: production-frontend
    ports:
      - "80:80" # Map host port 80 to container Nginx port 80. Change to "3000:80" if port 80 is in use.
    depends_on:
      - backend
    restart: always
    networks:
      - dost-prod-net

networks:
  dost-prod-net:
    driver: bridge
