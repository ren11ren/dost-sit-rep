version: '3.8'

services:
  # ==========================================
  # Production API Backend
  # ==========================================
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: production-backend
    ports:
      - "5001:5001"
      - "5005:5005"
    environment:
      - NODE_ENV=production
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
    env_file:
      - .env
    restart: always
    networks:
      - dost-prod-net

  # ==========================================
  # Production Frontend (Nginx SPA)
  # ==========================================
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: production-frontend
    ports:
      - "80:80" # Map host port 80 to container Nginx port 80. Change to "3000:80" if port 80 is in use.
    depends_on:
      - backend
    restart: always
    networks:
      - dost-prod-net

networks:
  dost-prod-net:
    driver: bridge
